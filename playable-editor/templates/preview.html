<!DOCTYPE html>
<html lang="en" style="overflow:hidden;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{margin:0;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;width:100%;height:100vh}
.root{position:relative;width:100%;height:100%;background:#000;overflow:hidden}
.video-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1}
.gradient-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.1) 30%,rgba(0,0,0,0.2) 70%,rgba(0,0,0,0.6) 100%);z-index:2;pointer-events:none}
.page{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;opacity:0;pointer-events:none;transition:opacity 0.5s ease}
.page.active{opacity:1;pointer-events:auto}
.page2{display:flex;flex-direction:column}
.chat-header{position:absolute;top:30px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:10px;z-index:20}
.header-avatar{width:36px;height:36px;border-radius:10px;object-fit:cover}
.header-name{font-size:16px;font-weight:700;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.8)}
.chat-container{position:absolute;top:80px;left:0;right:0;bottom:220px;overflow-y:auto;padding:12px;z-index:10;display:flex;flex-direction:column;scrollbar-width:none;-ms-overflow-style:none}
.chat-container::-webkit-scrollbar{display:none}
.chat-message{display:flex;flex-direction:column;margin-bottom:10px;opacity:0;transform:translateY(15px);transition:all 0.3s ease;max-width:80%}
.chat-message.show{opacity:1;transform:translateY(0)}
.chat-message.ai{align-self:flex-start;align-items:flex-start}
.chat-message.user{align-self:flex-end;align-items:flex-end}
.message-sender{font-size:10px;color:#fff;margin-bottom:3px;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,0.9)}
.message-content{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.4;word-wrap:break-word}
.chat-message.ai .message-content{background:var(--ai-bubble,linear-gradient(135deg,rgba(0,0,0,0.7),rgba(0,0,0,0.6)));border:1px solid rgba(255,255,255,0.3);color:#fff;border-bottom-left-radius:4px}
.chat-message.user .message-content{background:var(--user-bubble,linear-gradient(135deg,#4ADE80,#60A5FA));color:#fff;border-bottom-right-radius:4px}
.input-area{position:absolute;bottom:0;left:0;right:0;background:var(--bg-overlay,rgba(0,0,0,0.4));backdrop-filter:blur(20px);padding:8px 12px 12px;z-index:30}
.input-box{display:flex;align-items:center;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 12px;margin-bottom:6px}
.input-field{flex:1;background:transparent;border:none;color:#fff;font-size:13px;outline:none;padding:4px}
.input-field::placeholder{color:rgba(255,255,255,0.4)}
.send-btn{width:30px;height:30px;background:var(--send-btn,linear-gradient(135deg,#F472B6,#60A5FA,#4ADE80,#FBBF24));background-size:200% 200%;animation:gs 3s ease infinite;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
@keyframes gs{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.send-btn svg{width:14px;height:14px;fill:white}
.virtual-keyboard{padding:4px;background:rgba(0,0,0,0.3);border-radius:8px}
.keyboard-row{display:flex;justify-content:center;margin-bottom:4px;gap:3px}
.key{min-width:24px;height:28px;background:rgba(255,255,255,0.15);border:none;border-radius:4px;color:#fff;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:1;max-width:32px}
.key:active{background:linear-gradient(135deg,#F472B6,#60A5FA);transform:scale(0.95)}
.key.wide{min-width:36px;max-width:44px}
.key.space{min-width:80px;max-width:140px}
.key.send{background:var(--send-btn,linear-gradient(135deg,#F472B6,#60A5FA,#4ADE80,#FBBF24));background-size:200% 200%;animation:gs 3s ease infinite;min-width:36px;font-weight:600}
.typing-indicator{display:flex;gap:3px;padding:8px 12px;background:linear-gradient(135deg,rgba(244,114,182,0.25),rgba(96,165,250,0.25));border:1px solid rgba(255,255,255,0.2);border-radius:14px;border-bottom-left-radius:4px;width:fit-content}
.typing-dot{width:6px;height:6px;background:rgba(255,255,255,0.6);border-radius:50%;animation:tp 0.5s infinite}
.typing-dot:nth-child(2){animation-delay:0.07s}
.typing-dot:nth-child(3){animation-delay:0.14s}
@keyframes tp{0%,100%{opacity:1}50%{opacity:0.5}}
.typing-text{color:#fff;font-size:12px;font-style:italic;margin-left:3px}
.end-page{position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.5s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px)}
.end-page.active{opacity:1;pointer-events:auto}
.end-content{text-align:center;animation:fiu 0.6s ease}
@keyframes fiu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.end-logo{width:72px;height:72px;border-radius:18px;margin-bottom:14px}
.end-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px}
.end-desc{font-size:13px;color:#fff;margin-bottom:20px;line-height:1.5}
.download-btn-large{display:flex;align-items:center;gap:8px;padding:12px 24px;background:var(--user-bubble,linear-gradient(135deg,#4ADE80,#60A5FA));border:none;border-radius:24px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;animation:ps 1.2s infinite}
@keyframes ps{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.download-btn-large svg{width:20px;height:20px;fill:white}
.end-hint{font-size:12px;color:rgba(255,255,255,0.7);margin-top:14px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* 静态预览模式下的消息列表 */
.preview-static .chat-message{opacity:1;transform:none}
</style>
</head>
<body>
<div class="root" id="root">
  <video class="video-bg" id="bgVideo" autoplay loop muted playsinline preload="auto"></video>
  <div class="gradient-overlay"></div>

  <div class="page page2 active" id="page2">
    <div class="chat-header">
      <img src="" alt="AI" class="header-avatar" id="headerAvatar">
      <div class="header-info"><div class="header-name" id="headerName">Eric</div></div>
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
      <div class="input-box">
        <input type="text" class="input-field" id="textInput" placeholder="Type a message..." readonly>
        <button class="send-btn" id="sendBtn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
      </div>
      <div class="virtual-keyboard" id="virtualKeyboard">
        <div class="keyboard-row">
          <button class="key" data-key="q">q</button><button class="key" data-key="w">w</button>
          <button class="key" data-key="e">e</button><button class="key" data-key="r">r</button>
          <button class="key" data-key="t">t</button><button class="key" data-key="y">y</button>
          <button class="key" data-key="u">u</button><button class="key" data-key="i">i</button>
          <button class="key" data-key="o">o</button><button class="key" data-key="p">p</button>
        </div>
        <div class="keyboard-row">
          <button class="key" data-key="a">a</button><button class="key" data-key="s">s</button>
          <button class="key" data-key="d">d</button><button class="key" data-key="f">f</button>
          <button class="key" data-key="g">g</button><button class="key" data-key="h">h</button>
          <button class="key" data-key="j">j</button><button class="key" data-key="k">k</button>
          <button class="key" data-key="l">l</button>
        </div>
        <div class="keyboard-row">
          <button class="key wide" id="shiftKey">⇧</button>
          <button class="key" data-key="z">z</button><button class="key" data-key="x">x</button>
          <button class="key" data-key="c">c</button><button class="key" data-key="v">v</button>
          <button class="key" data-key="b">b</button><button class="key" data-key="n">n</button>
          <button class="key" data-key="m">m</button>
          <button class="key wide" id="backspaceKey">⌫</button>
        </div>
        <div class="keyboard-row">
          <button class="key" id="numKey">123</button>
          <button class="key space" data-key=" ">space</button>
          <button class="key send" id="keyboardSend">Send</button>
        </div>
      </div>
    </div>
  </div>

  <div class="end-page" id="endPage">
    <div class="end-content">
      <img src="" alt="" class="end-logo" id="endLogo">
      <h2 class="end-title" id="endTitle">Discover Your AI Soulmate</h2>
      <p class="end-desc" id="endDesc"></p>
      <div style="display:flex;justify-content:center">
        <button class="download-btn-large" id="downloadBtn">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          <span id="endCtaText">Download</span>
        </button>
      </div>
      <p class="end-hint">Tap anywhere to continue ↓</p>
    </div>
  </div>
</div>

<script>
(function() {
  // ========== UI 多语言字符串 ==========
  const UI_STRINGS = {
    'EN': { lang:'en', placeholder:'Type a message...', space:'space', send:'Send', typing:'Typing...', read:'Read', you:'You', hint:'Tap anywhere to continue ↓' },
    'JP': { lang:'ja', placeholder:'メッセージを入力...', space:'スペース', send:'送信', typing:'入力中...', read:'既読', you:'あなた', hint:'タップして続ける ↓' },
    'TC': { lang:'zh-Hant', placeholder:'輸入訊息...', space:'空格', send:'發送', typing:'輸入中...', read:'已讀', you:'你', hint:'點擊任意位置繼續 ↓' },
    'CN': { lang:'zh-CN', placeholder:'输入消息...', space:'空格', send:'发送', typing:'输入中...', read:'已读', you:'你', hint:'点击任意位置继续 ↓' }
  };

  function getUI() {
    const locale = config?.locale || 'EN';
    return UI_STRINGS[locale] || UI_STRINGS['EN'];
  }

  // ========== 状态 ==========
  let config = null;
  let mode = 'static'; // 'static' | 'playing'
  let playAbort = false;

  const $ = id => document.getElementById(id);
  const chatContainer = $('chatContainer');
  const textInput = $('textInput');
  const sendBtn = $('sendBtn');
  const endPage = $('endPage');
  const bgVideo = $('bgVideo');
  const headerAvatar = $('headerAvatar');
  const headerName = $('headerName');
  const endLogo = $('endLogo');
  const endTitle = $('endTitle');
  const endDesc = $('endDesc');
  const endCtaText = $('endCtaText');

  // ========== 工具 ==========
  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ========== 应用布局参数 ==========
  function applyLayout() {
    if (!config) return;
    const ly = config.layout || {};
    const header = document.querySelector('.chat-header');
    if (header) header.style.top = (ly.headerTop || 30) + 'px';
    chatContainer.style.top = (ly.chatTop || 80) + 'px';
    chatContainer.style.bottom = (ly.chatBottom || 220) + 'px';
    chatContainer.style.padding = (ly.chatPadding || 12) + 'px';
  }

  // ========== 应用 UI 语言 ==========
  function applyLocale() {
    const ui = getUI();
    document.documentElement.lang = ui.lang;
    textInput.placeholder = ui.placeholder;
    const kSend = $('keyboardSend');
    if (kSend) kSend.textContent = ui.send;
    const spaceKey = document.querySelector('.key.space');
    if (spaceKey) spaceKey.textContent = ui.space;
    const hint = document.querySelector('.end-hint');
    if (hint) hint.textContent = ui.hint;
  }

  // ========== 渲染静态预览 ==========
  function renderStatic() {
    if (!config) return;
    const ui = getUI();
    // 更新头部
    headerAvatar.src = config.assets?.logoUrl || '';
    headerName.textContent = config.aiName || 'Eric';
    // 更新视频
    const vUrl = config.assets?.videoUrl || '';
    if (bgVideo.src !== vUrl) bgVideo.src = vUrl;
    // 更新结束页
    endLogo.src = config.assets?.logoUrl || '';
    endTitle.textContent = config.endcard?.title || '';
    endDesc.innerHTML = (config.endcard?.desc || '').replace(/\n/g, '<br>');
    endCtaText.textContent = config.endcard?.ctaText || 'Download';
    // CSS 变量
    const root = document.documentElement;
    if (config.theme) {
      root.style.setProperty('--send-btn', config.theme.sendBtnGradient || '');
      root.style.setProperty('--ai-bubble', config.theme.aiBubbleBg || '');
      root.style.setProperty('--user-bubble', config.theme.userBubbleGradient || '');
      root.style.setProperty('--bg-overlay', config.theme.bgOverlay || '');
    }
    // 应用布局和语言
    applyLayout();
    applyLocale();
    // 渲染消息列表（静态）
    chatContainer.innerHTML = '';
    chatContainer.classList.add('preview-static');
    endPage.classList.remove('active');
    (config.messages || []).forEach(msg => {
      if (msg.type === 'user_trigger' || msg.type === 'user_trigger_end') {
        const d = document.createElement('div');
        d.className = 'chat-message user show';
        d.innerHTML = `<div class="message-sender">${ui.you}</div><div class="message-content" style="opacity:0.5;font-style:italic;">[${ui.send}]</div>`;
        chatContainer.appendChild(d);
        return;
      }
      const d = document.createElement('div');
      d.className = `chat-message ${msg.type === 'ai' ? 'ai' : 'user'} show`;
      const sender = msg.type === 'ai' ? (config.aiName || 'Eric') : ui.you;
      d.innerHTML = `<div class="message-sender">${sender}</div><div class="message-content">${msg.content || ''}</div>`;
      chatContainer.appendChild(d);
    });
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  // ========== 播放模式 ==========
  async function playPreview() {
    if (!config) return;
    mode = 'playing';
    playAbort = false;
    chatContainer.classList.remove('preview-static');
    chatContainer.innerHTML = '';
    endPage.classList.remove('active');
    textInput.value = '';

    const messages = config.messages || [];
    const timing = config.timing || {};
    const typingDuration = timing.typingDuration || 500;
    const messageGap = timing.messageGap || 200;
    const aiName = config.aiName || 'Eric';
    let userResolve = null;

    // 当前等待的消息索引
    let waitingMsgIndex = -1;

    // 临时绑定发送按钮
    function onSend() {
      const text = textInput.value.trim();
      if (!text) return;
      textInput.value = '';
      // user_trigger_end: 不显示消息，直接跳转结束页
      const curMsg = messages[waitingMsgIndex];
      if (curMsg && curMsg.type === 'user_trigger_end') {
        if (userResolve) { const r = userResolve; userResolve = null; r(); }
        return;
      }
      addMsg('user', text).then(() => {
        if (userResolve) { const r = userResolve; userResolve = null; r(); }
      });
    }
    sendBtn.addEventListener('click', onSend);
    const kSend = $('keyboardSend');
    if (kSend) kSend.addEventListener('click', onSend);

    // 键盘输入
    function onKey(e) {
      const k = e.target.closest('.key[data-key]');
      if (!k) return;
      const v = k.getAttribute('data-key');
      textInput.value += v;
    }
    document.addEventListener('click', onKey);

    for (let i = 0; i < messages.length; i++) {
      if (playAbort) break;
      const msg = messages[i];
      if (msg.type === 'ai') {
        if (i > 0) {
          showTyping(aiName);
          await delay(typingDuration);
          removeTyping();
          await delay(messageGap);
        } else {
          await delay(msg.delayAfterPrev || 500);
        }
        if (playAbort) break;
        await addMsg('ai', msg.content);
      } else if (msg.type === 'user_trigger' || msg.type === 'user_trigger_end') {
        waitingMsgIndex = i;
        await new Promise(r => { userResolve = r; });
        if (msg.type === 'user_trigger_end') {
          endPage.classList.add('active');
          break;
        }
      }
    }
    if (!playAbort && !endPage.classList.contains('active')) {
      endPage.classList.add('active');
    }

    // 清理
    sendBtn.removeEventListener('click', onSend);
    if (kSend) kSend.removeEventListener('click', onSend);
    document.removeEventListener('click', onKey);
    mode = 'static';
  }

  function addMsg(type, text) {
    return new Promise(resolve => {
      const ui = getUI();
      const d = document.createElement('div');
      d.className = `chat-message ${type}`;
      const sender = type === 'ai' ? (config?.aiName || 'Eric') : ui.you;
      const t = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',hour12:false});
      d.innerHTML = `<div class="message-sender">${sender}</div><div class="message-content">${text}</div><div class="message-meta" style="font-size:9px;color:#fff;margin-top:3px"><span>${t}</span><span style="color:#4ADE80;font-weight:500;margin-left:4px">${ui.read}</span></div>`;
      chatContainer.appendChild(d);
      d.offsetHeight;
      d.classList.add('show');
      chatContainer.scrollTop = chatContainer.scrollHeight;
      setTimeout(resolve, 300);
    });
  }

  function showTyping(name) {
    const ui = getUI();
    const d = document.createElement('div');
    d.className = 'chat-message ai';
    d.id = 'typingIndicator';
    d.innerHTML = `<div class="message-sender">${name}</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div><span class="typing-text">${ui.typing}</span></div>`;
    chatContainer.appendChild(d);
    d.offsetHeight;
    d.classList.add('show');
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function removeTyping() {
    const el = $('typingIndicator');
    if (el) el.remove();
  }

  // ========== postMessage 通信 ==========
  window.addEventListener('message', function(e) {
    const data = e.data;
    if (!data || !data.type) return;
    if (data.type === 'updateConfig') {
      config = data.config;
      if (mode === 'static') renderStatic();
    } else if (data.type === 'play') {
      playPreview();
    } else if (data.type === 'reset') {
      playAbort = true;
      mode = 'static';
      if (config) renderStatic();
    }
  });

  // 键盘基础功能
  const shiftKey = $('shiftKey');
  const backspaceKey = $('backspaceKey');
  let isShift = false;
  if (shiftKey) shiftKey.addEventListener('click', () => {
    isShift = !isShift;
    shiftKey.style.background = isShift ? 'linear-gradient(135deg,#F472B6,#60A5FA)' : 'rgba(255,255,255,0.15)';
    document.querySelectorAll('.key[data-key]').forEach(k => {
      const c = k.getAttribute('data-key');
      if (c && c.length === 1 && /[a-z]/i.test(c)) k.textContent = isShift ? c.toUpperCase() : c.toLowerCase();
    });
  });
  if (backspaceKey) backspaceKey.addEventListener('click', () => { textInput.value = textInput.value.slice(0, -1); });

  // 通知父窗口已就绪
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'previewReady' }, '*');
  }

  bgVideo.play().catch(() => {});
})();
</script>
</body>
</html>
